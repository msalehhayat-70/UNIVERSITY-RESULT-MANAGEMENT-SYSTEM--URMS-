<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URMS — KICSIT</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
</head>
<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#1E3A5F;flex-direction:column;gap:16px;">
            <div style="font-size:2rem;font-weight:800;color:#D4AC0D;letter-spacing:2px;">URMS</div>
            <div style="font-size:0.9rem;color:rgba(255,255,255,0.6);">University Result Management System</div>
            <div style="width:36px;height:36px;border:3px solid rgba(255,255,255,0.2);border-top-color:#D4AC0D;border-radius:50%;animation:spin 0.8s linear infinite;margin-top:8px;"></div>
            <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
        </div>
    </div>
    <div id="blazor-error-ui" style="display:none;position:fixed;bottom:0;width:100%;background:#c00;color:white;padding:12px;text-align:center;">
        An error occurred. <a href="" style="color:white;">Reload</a>
        <a onclick="document.getElementById('blazor-error-ui').style.display='none'" style="color:white;cursor:pointer;float:right;">✕</a>
    </div>
    <script src="js/urms.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
